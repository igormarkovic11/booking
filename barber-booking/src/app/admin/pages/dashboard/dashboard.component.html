<div class="admin-page">
  <div class="admin-card">
    <div class="admin-header">
      <div class="top-row">
        <h2>{{ "ADMIN.DASHBOARD_TITLE" | translate }}</h2>
        <div class="header-actions">
          <button
            class="dayoff-btn"
            [class.active]="isCurrentDayOff"
            (click)="toggleDayOff()"
          >
            {{
              isCurrentDayOff
                ? ("ADMIN.DAY_OFF_OPEN" | translate)
                : ("ADMIN.DAY_OFF_CLOSE" | translate)
            }}
          </button>
          <button
            class="add-btn"
            (click)="quickAdd()"
            [disabled]="isCurrentDayOff"
          >
            {{ "ADMIN.NEW_APPOINTMENT" | translate }}
          </button>
        </div>
      </div>

      <div class="date-row">
        <app-date-navigator
          [date]="selectedDay"
          (dateChange)="onDateChanged($event)"
          (stepped)="onDateStepped($event)"
        />
      </div>
    </div>

    <div class="day-off-banner" *ngIf="isCurrentDayOff">
      {{ "ADMIN.DAY_OFF_BANNER" | translate }}
    </div>

    <div class="load-error" *ngIf="loadError; else bookingListTpl">
      <span>⚠️ {{ "ADMIN.LOAD_ERROR" | translate }}</span>
      <button class="retry-btn" (click)="retryLoad()">
        {{ "ADMIN.RETRY" | translate }}
      </button>
    </div>

    <ng-template #bookingListTpl>
      <app-booking-list
        [bookings]="bookings"
        [loading]="loading"
        (delete)="onDeleteRequested($event)"
        (call)="onCallCopied($event)"
      />
    </ng-template>
  </div>
</div>

<app-delete-modal
  [visible]="showDeleteModal"
  (confirmed)="onDeleteConfirmed()"
  (cancelled)="onDeleteCancelled()"
/>

<app-quick-add-modal
  [visible]="showQuickAddModal"
  [availableTimes]="filteredAvailableTimes"
  (saved)="onQuickAddSaved($event)"
  (cancelled)="onQuickAddCancelled()"
/>

<app-toast [state]="toast" />
<app-booking-notification />
