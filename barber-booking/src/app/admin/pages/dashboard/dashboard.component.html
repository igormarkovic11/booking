<div class="admin-page">
  <div class="admin-card main-panel">
    <div class="admin-header">
      <div class="top-row">
        <h2>Pregled termina</h2>
        <div class="header-actions">
          <button
            class="dayoff-btn"
            [class.active]="isCurrentDayOff"
            (click)="toggleDayOff()"
          >
            {{ isCurrentDayOff ? "🔓 Otvori dan" : "🚫 Zatvori dan" }}
          </button>
          <button
            class="add-btn"
            (click)="quickAdd()"
            [disabled]="isCurrentDayOff"
          >
            Novi termin
          </button>
        </div>
      </div>

      <div class="date-row">
        <div class="date-navigator">
          <button (click)="changeDate(-1)">◀</button>
          <input
            type="date"
            [(ngModel)]="selectedDay"
            (change)="onDateChange()"
            class="calendar-input"
          />
          <button (click)="changeDate(1)">▶</button>
        </div>
      </div>
    </div>

    <div class="day-off-banner" *ngIf="isCurrentDayOff">
      ⚠️ DAN JE OZNAČEN KAO NERADNI
    </div>

    <div class="bookings-list">
      <div *ngIf="loading" class="loader">Učitavanje...</div>

      <div class="no-data" *ngIf="!loading && bookings.length === 0">
        Nema rezervacija za ovaj dan.
      </div>

      <div class="booking-row" *ngFor="let b of bookings">
        <div class="time-box">{{ b.time }}</div>
        <div class="info-box">
          <span class="client-name">{{ b.name }}</span>
          <span class="client-services">{{ b.services.join(", ") }}</span>
        </div>
        <div class="actions-box">
          <a
            [href]="'tel:' + b.phone"
            class="action-btn call"
            (click)="copyToClipboard(b.phone)"
            title="Pozovi i kopiraj broj"
            >📞</a
          >
          <button (click)="confirmDelete(b)" class="action-btn delete">
            🗑️
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALI -->
<app-pin-modal
  [visible]="showPinModal"
  (confirmed)="onPinConfirmed($event)"
  (cancelled)="onPinCancelled()"
/>

<app-delete-modal
  [visible]="showDeleteModal"
  (confirmed)="onDeleteConfirmed()"
  (cancelled)="onDeleteCancelled()"
/>

<app-quick-add-modal
  [visible]="showQuickAddModal"
  [availableTimes]="filteredAvailableTimes"
  (saved)="onQuickAddSaved($event)"
  (cancelled)="onQuickAddCancelled()"
/>

<!-- TOAST -->
<div
  class="toast"
  [class.show]="notification.show"
  [class.error]="notification.type === 'error'"
>
  <span class="toast-icon">{{
    notification.type === "success" ? "✅" : "❌"
  }}</span>
  <span class="toast-msg">{{ notification.message }}</span>
</div>
