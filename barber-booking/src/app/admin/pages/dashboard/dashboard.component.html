<div class="admin-page">
  <div class="admin-card">
    <div class="admin-header">
      <div class="top-row">
        <h2>Pregled termina</h2>
        <div class="header-actions">
          <button
            class="dayoff-btn"
            [class.active]="isCurrentDayOff"
            (click)="toggleDayOff()"
          >
            {{ isCurrentDayOff ? "🔓 Otvori dan" : "🚫 Zatvori dan" }}
          </button>
          <button
            class="add-btn"
            (click)="quickAdd()"
            [disabled]="isCurrentDayOff"
          >
            Novi termin
          </button>
        </div>
      </div>

      <div class="date-row">
        <app-date-navigator
          [date]="selectedDay"
          (dateChange)="onDateChanged($event)"
          (stepped)="onDateStepped($event)"
        />
      </div>
    </div>

    <div class="day-off-banner" *ngIf="isCurrentDayOff">
      ⚠️ DAN JE OZNAČEN KAO NERADNI
    </div>

    <div class="load-error" *ngIf="loadError; else bookingListTpl">
      <span>⚠️ Nije moguće učitati podatke.</span>
      <button class="retry-btn" (click)="retryLoad()">🔄 Pokušaj ponovo</button>
    </div>

    <ng-template #bookingListTpl>
      <app-booking-list
        [bookings]="bookings"
        [loading]="loading"
        (delete)="onDeleteRequested($event)"
        (call)="onCallCopied($event)"
      />
    </ng-template>
  </div>
</div>

<app-delete-modal
  [visible]="showDeleteModal"
  (confirmed)="onDeleteConfirmed()"
  (cancelled)="onDeleteCancelled()"
/>

<app-quick-add-modal
  [visible]="showQuickAddModal"
  [availableTimes]="filteredAvailableTimes"
  (saved)="onQuickAddSaved($event)"
  (cancelled)="onQuickAddCancelled()"
/>

<app-toast [state]="toast" />
<app-booking-notification />
