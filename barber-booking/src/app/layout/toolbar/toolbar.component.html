<mat-toolbar class="toolbar">
  <a
    class="logo-link"
    (click)="onLogoClick()"
    style="cursor: pointer"
    routerLink="/"
  >
    <img src="assets/images/logoNoBg.png" alt="Logo" class="nav-logo" />
    <span class="logo">Hairstyle Vidaković</span>
  </a>

  <span class="spacer"></span>

  <!-- DESKTOP LINKS -->
  <nav class="nav-links">
    <a
      mat-button
      routerLink="/about"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ "NAV.ABOUT" | translate }}
    </a>
    <a mat-button routerLink="/contact" routerLinkActive="active-link">
      {{ "NAV.CONTACT" | translate }}
    </a>
    <a mat-button routerLink="/favor" routerLinkActive="active-link">
      {{ "NAV.SERVICES" | translate }}
    </a>
  </nav>

  <!-- LANGUAGE SWITCHER (desktop) -->
  <div class="lang-switcher">
    <button
      *ngFor="let lang of langService.languages"
      class="lang-btn"
      [class.active]="langService.current === lang.code"
      (click)="switchLang(lang.code)"
    >
      <span class="fi" [ngClass]="'fi-' + lang.flag"></span>
      <span class="lang-label">{{ lang.label }}</span>
    </button>
  </div>

  <!-- BOOKING BUTTON -->
  <button
    mat-raised-button
    color="primary"
    class="booking-btn"
    routerLink="/booking"
  >
    {{ "NAV.BOOK" | translate }}
  </button>

  <!-- ADMIN LOGOUT (desktop) -->
  <button
    *ngIf="isAdmin$ | async"
    mat-stroked-button
    class="logout-btn"
    (click)="logout()"
  >
    <mat-icon>logout</mat-icon>
    <span>{{ "ADMIN.LOGOUT" | translate }}</span>
  </button>

  <!-- HAMBURGER (mobile) -->
  <button mat-icon-button class="menu-btn" (click)="toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<!-- MOBILE MENU -->
<div class="mobile-menu" *ngIf="menuOpen">
  <a routerLink="/about" routerLinkActive="active-mobile" (click)="closeMenu()">
    {{ "NAV.ABOUT" | translate }}
  </a>
  <a
    routerLink="/contact"
    routerLinkActive="active-mobile"
    (click)="closeMenu()"
  >
    {{ "NAV.CONTACT" | translate }}
  </a>
  <a routerLink="/favor" routerLinkActive="active-mobile" (click)="closeMenu()">
    {{ "NAV.SERVICES" | translate }}
  </a>
  <a
    routerLink="/booking"
    routerLinkActive="active-mobile"
    class="highlight"
    (click)="closeMenu()"
  >
    {{ "NAV.BOOK" | translate }}
  </a>

  <!-- LANGUAGE SWITCHER (mobile) -->
  <div class="lang-switcher-mobile">
    <button
      *ngFor="let lang of langService.languages"
      class="lang-btn"
      [class.active]="langService.current === lang.code"
      (click)="switchLang(lang.code); closeMenu()"
    >
      <span class="lang-flag">{{ lang.flag }}</span>
      <span class="lang-label">{{ lang.label }}</span>
    </button>
  </div>

  <!-- ADMIN LOGOUT (mobile) -->
  <button
    *ngIf="isAdmin$ | async"
    class="logout-mobile"
    (click)="logout(); closeMenu()"
  >
    <mat-icon>logout</mat-icon>
    <span>{{ "ADMIN.LOGOUT" | translate }}</span>
  </button>
</div>
