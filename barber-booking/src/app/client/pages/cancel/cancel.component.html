<div class="cancel-page">
  <div class="cancel-card">
    <div *ngIf="status === 'loading'" class="status-box">
      <div class="spinner"></div>
      <h2>Otkazivanje u toku...</h2>
      <p>Molimo sačekajte dok obradimo vaš zahtev.</p>
    </div>

    <div *ngIf="status === 'success'" class="status-box">
      <div class="icon success">✅</div>
      <h2>Termin je otkazan</h2>
      <p>
        Uspešno ste otkazali svoj termin. Hvala što ste nas obavestili na vreme.
      </p>
      <button class="home-btn" (click)="navigateToHome()">
        Vrati se na početnu
      </button>
    </div>

    <div *ngIf="status === 'error'" class="status-box">
      <div class="icon error">❌</div>
      <h2>Greška pri otkazivanju</h2>
      <p>
        Link nije validan, termin je već otkazan ili više ne postoji u sistemu.
      </p>
      <button class="home-btn" (click)="navigateToHome()">
        Vrati se na početnu
      </button>
    </div>
  </div>
</div>
