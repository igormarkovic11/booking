<div class="cancel-page">
  <div class="cancel-card">
    <div *ngIf="status === 'loading'" class="status-box">
      <div class="spinner"></div>
      <h2>{{ "CANCEL.LOADING" | translate }}</h2>
    </div>

    <div *ngIf="status === 'success'" class="status-box">
      <div class="icon success">✅</div>
      <h2>{{ "CANCEL.SUCCESS" | translate }}</h2>
      <button class="home-btn" (click)="navigateToHome()">
        {{ "CANCEL.HOME" | translate }}
      </button>
    </div>

    <div *ngIf="status === 'error'" class="status-box">
      <div class="icon error">❌</div>
      <h2>{{ "CANCEL.ERROR" | translate }}</h2>
      <button class="home-btn" (click)="navigateToHome()">
        {{ "CANCEL.HOME" | translate }}
      </button>
    </div>
  </div>
</div>
