<div class="booking-page">
  <div class="booking-card">
    <h2>Zakaži termin</h2>

    <!-- DATUM -->
    <p class="step-instruction">Izaberi datum</p>
    <select [(ngModel)]="selectedDate" class="date-dropdown">
      <option *ngFor="let date of nextDates" [ngValue]="date">
        {{ date | date : "EEEE, dd.MM.yyyy" }}
      </option>
    </select>

    <!-- TERMINI -->
    <p class="step-instruction">Odaberite termin</p>
    <div class="time-grid">
      <button
        *ngFor="let time of times"
        (click)="selectTime(time)"
        [class.active]="selectedTime === time"
      >
        {{ time }}
      </button>
    </div>

    <!-- USLUGE -->
    <div class="services-box">
      <p class="services-title">Šta planiraš? <span>(opciono)</span></p>
      <div class="checkboxes">
        <label *ngFor="let service of services">
          <input
            type="checkbox"
            [checked]="selectedServices.includes(service)"
            (change)="toggleService(service)"
          />
          <span>{{ service }}</span>
        </label>
      </div>
    </div>

    <!-- PODACI -->
    <input
      type="text"
      placeholder="Ime"
      [(ngModel)]="name"
      class="custom-input"
    />
    <input
      type="text"
      placeholder="Telefon"
      [(ngModel)]="phone"
      class="custom-input"
    />

    <button
      class="full-width submit-btn"
      (click)="submitBooking()"
      [disabled]="!selectedTime || !name || !phone"
    >
      Završi
    </button>
  </div>
</div>
