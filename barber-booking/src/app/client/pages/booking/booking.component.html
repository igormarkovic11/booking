<div class="booking-page">
  <div class="booking-card">
    <div *ngIf="availableDates.length === 0" class="loader-container">
      <div class="spinner"></div>
      <p>{{ "ADMIN.LOADING" | translate }}</p>
    </div>

    <div *ngIf="availableDates.length > 0" class="content-fade-in">
      <h2>{{ "BOOKING.TITLE" | translate }}</h2>

      <app-date-selector
        [availableDates]="availableDates"
        [selectedDate]="selectedDate"
        [disabled]="!!successMessage"
        (dateChange)="onDateChanged($event)"
      />

      <div class="snapshot-error" *ngIf="snapshotError">
        <span>⚠️ {{ "BOOKING.SNAPSHOT_ERROR" | translate }}</span>
        <button (click)="retrySnapshot()">
          {{ "BOOKING.RETRY" | translate }}
        </button>
      </div>

      <div class="auto-advance-msg" *ngIf="autoAdvanceMessage">
        ℹ️ {{ autoAdvanceMessage }}
      </div>

      <app-time-selector
        [times]="filteredTimes"
        [bookedTimes]="bookedTimes"
        [selectedTime]="selectedTime"
        [disabled]="!!successMessage"
        (timeChange)="selectedTime = $event"
      />

      <app-service-selector
        [services]="services"
        [disabled]="!!successMessage"
        (toggled)="onServiceToggled($event)"
      />

      <div class="submission-area">
        <app-booking-form
          *ngIf="!successMessage"
          [loading]="loading"
          [errorMessage]="errorMessage"
          [canSubmit]="canSubmit"
          (submitted)="onFormSubmitted($event)"
        />

        <app-success-message
          *ngIf="successMessage"
          [message]="successMessage"
          (closed)="onSuccessClosed()"
        />
      </div>
    </div>
  </div>
</div>
